<div
  class="dcx-ng-scroll-top-down__group"
  role="group"
  [attr.aria-label]="groupLabel()"
>
  @if (showTop()) {
    <dcx-ng-button
      [class]="buttonClasses() + ' dcx-ng-scroll-top-down__button--top'"
      type="button"
      variant="secondary"
      [size]="size()"
      [icon]="true"
      [iconName]="topIcon()"
      [iconSize]="iconSize()"
      [ariaLabel]="topLabel()"
      (buttonClick)="scrollToTop()"
    />
  }

  @if (showBottom()) {
    <dcx-ng-button
      [class]="buttonClasses() + ' dcx-ng-scroll-top-down__button--bottom'"
      type="button"
      variant="secondary"
      [size]="size()"
      [icon]="true"
      [iconName]="bottomIcon()"
      [iconSize]="iconSize()"
      [ariaLabel]="bottomLabel()"
      (buttonClick)="scrollToBottom()"
    />
  }
</div>
