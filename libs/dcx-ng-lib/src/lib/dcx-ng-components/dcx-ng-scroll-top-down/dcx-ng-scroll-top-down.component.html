<div
  class="dcx-ng-scroll-top-down__group"
  role="group"
  [attr.aria-label]="groupLabel()"
>
  @if (showTop()) {
    <dcx-ng-button
      [class]="buttonClasses('top')"
      type="button"
      variant="secondary"
      [size]="size()"
      [ariaLabel]="topLabel()"
      (buttonClick)="scrollToTop()"
    >
      <dcx-ng-icon [name]="topIcon()" [size]="iconSize()" />
    </dcx-ng-button>
  }

  @if (showBottom()) {
    <dcx-ng-button
      [class]="buttonClasses('bottom')"
      type="button"
      variant="secondary"
      [size]="size()"
      [ariaLabel]="bottomLabel()"
      (buttonClick)="scrollToBottom()"
    >
      <dcx-ng-icon [name]="bottomIcon()" [size]="iconSize()" />
    </dcx-ng-button>
  }
</div>
