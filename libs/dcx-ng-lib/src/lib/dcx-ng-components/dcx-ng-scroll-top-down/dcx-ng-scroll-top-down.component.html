<div
  class="dcx-ng-scroll-top-down__group"
  role="group"
  [attr.aria-label]="groupLabel()"
>
  @if (showTop()) {
    <dcx-ng-button
      class="dcx-ng-scroll-top-down__button dcx-ng-scroll-top-down__button--top"
      [class.dcx-ng-scroll-top-down__button--s]="size() === 's'"
      [class.dcx-ng-scroll-top-down__button--m]="size() === 'm'"
      [class.dcx-ng-scroll-top-down__button--l]="size() === 'l'"
      [class.dcx-ng-scroll-top-down__button--xl]="size() === 'xl'"
      type="button"
      variant="secondary"
      [size]="size()"
      [icon]="true"
      [iconName]="topIcon()"
      [iconSize]="iconSize()"
      [ariaLabel]="topLabel()"
      (buttonClick)="scrollToTop()"
    />
  }

  @if (showBottom()) {
    <dcx-ng-button
      class="dcx-ng-scroll-top-down__button dcx-ng-scroll-top-down__button--bottom"
      [class.dcx-ng-scroll-top-down__button--s]="size() === 's'"
      [class.dcx-ng-scroll-top-down__button--m]="size() === 'm'"
      [class.dcx-ng-scroll-top-down__button--l]="size() === 'l'"
      [class.dcx-ng-scroll-top-down__button--xl]="size() === 'xl'"
      type="button"
      variant="secondary"
      [size]="size()"
      [icon]="true"
      [iconName]="bottomIcon()"
      [iconSize]="iconSize()"
      [ariaLabel]="bottomLabel()"
      (buttonClick)="scrollToBottom()"
    />
  }
</div>
