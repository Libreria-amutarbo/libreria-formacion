<div class="dcx-dropdown" [class.dcx-disabled]="disabled">
  <dcx-ng-button
    type="button"
    class="dcx-trigger"
    [variant]="'primary'"
    size="m"
    [icon]="true"
    iconName="expand_more"
    [disabled]="disabled"
    [label]="displayLabel()"
    [attr.aria-expanded]="_open()"
    (buttonClick)="toggle()"
    >Hola</dcx-ng-button
  >

  @if (_open()) {
    <div class="dcx-panel">
      <ul class="dcx-list" role="listbox">
        @for (item of dropdownOptions; track item.key) {
          <li class="dcx-item" [class.selected]="isSelected(item)">
            <dcx-ng-button
              type="button"
              variant="text"
              size="m"
              class="dcx-item__button"
              [label]="valueToString(item.value)"
              [attr.aria-selected]="isSelected(item)"
              role="option"
              (buttonClick)="select(item)"
            >
              @if (isSelected(item)) {
                <span button-trailing class="dcx-item__check">✓</span>
              }
            </dcx-ng-button>
          </li>
        }
        @if (!dropdownOptions.length) {
          <li class="dcx-empty">(Sin opciones)</li>
        }
      </ul>
    </div>
  }
</div>
