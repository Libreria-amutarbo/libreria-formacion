<div class="dcx-checkbox-group">
  <div class="dcx-checkbox-group__options">
    @for (option of _options(); track option.value) {
      <label
        class="dcx-checkbox-label"
        [class.disabled]="option.disabled"
        [class.label-left]="option.labelPosition === 'left'"
      >
        @if (
          option.labelPosition === 'left' || option.labelPosition === undefined
        ) {
          <ng-container
            *ngTemplateOutlet="textLabel; context: {option: option}"
          ></ng-container>
        }
        <dcx-ng-button
          [variant]="getButtonVariant(option)"
          icon
          isCheckbox
          [disabled]="option.disabled ?? false"
          [checkboxError]="getCheckboxError(option)"
          [iconName]="getIconName(option)"
          [iconSize]="'l'"
          (buttonClick)="changeValue(option.id)"
        >
        </dcx-ng-button>

        @if (option.labelPosition === 'right') {
          <ng-container
            *ngTemplateOutlet="textLabel; context: {option: option}"
          ></ng-container>
        }
      </label>
      @if (option.error && option.errorMessage !== '') {
        <div class="dcx-ng-checkbox__error">
          <dcx-ng-icon [name]="errorIcon()"></dcx-ng-icon>

          <span>
            {{ option.errorMessage }}
          </span>
        </div>
      }
    }
  </div>
</div>

<ng-template #textLabel let-option="option">
  <span
    class="dcx-checkbox-text"
    [class.error]="option.error"
    >{{ option.label }}</span
  >
  @if (option.required) {
    <span class="dcx-ng-checkbox__required">*</span>
  }
</ng-template>
