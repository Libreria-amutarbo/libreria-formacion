<div class="dcx-icon-field-wrapper">
  <div class="dcx-icon-field-container">
    <!-- @if (iconLeft) {
      <div class="dcx-icon-left">
        <dcx-ng-icon [name]="iconLeft" [size]="iconSize()"></dcx-ng-icon>
      </div>
    } -->

    @if (iconPosition() === 'left') {
      <div class="dcx-icon-left">
        <dcx-ng-icon
          [name]="iconName()"
          [size]="iconSize()"
          aria-hidden="true"
        />
      </div>
    }

    <dcx-ng-input> </dcx-ng-input>

      type="text"
      class="dcx-icon-field-input"
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="disabled"
      (input)="onInput($event)"
      (blur)="onBlur()"
      (focus)="onFocus()"
    /> -->

    <!-- @if (iconRight) {
      <div class="dcx-icon-right">
        <dcx-ng-icon icon [name]="iconRight" [size]="iconSize()"></dcx-ng-icon>
      </div>
    } -->
    @if (iconPosition() === 'right') {
      <div class="dcx-icon-right">
        <dcx-ng-icon
          [name]="iconName()"
          [size]="iconSize()"
          aria-hidden="true"
        />
      </div>
    }
  </div>
</div>
