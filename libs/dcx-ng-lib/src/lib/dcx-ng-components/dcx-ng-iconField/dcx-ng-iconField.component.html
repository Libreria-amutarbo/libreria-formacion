<div
  class="icon-field"
  [class.has-left]="iconPositionChange()"
  [class.has-right]="iconPositionChange()"
>
  @if (iconPosition() === 'left' && iconName() !== '') {
    <dcx-ng-button
      icon
      [iconName]="iconName()"
      [variant]="'icon-only'"
      [iconSize]="iconSize()"
      isIconClickable
      (buttonClick)="onIconClick()"
    ></dcx-ng-button>
  }

  <ng-content></ng-content>

  @if (iconPosition() === 'right' && iconName() !== '') {
    <dcx-ng-button
      icon
      [iconName]="iconName()"
      [variant]="'icon-only'"
      [iconSize]="iconSize()"
      isIconClickable
      (buttonClick)="onIconClick()"
    ></dcx-ng-button>
  }
</div>
