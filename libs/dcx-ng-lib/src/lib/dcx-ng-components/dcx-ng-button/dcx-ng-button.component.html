<ng-template #iconTpl>
  <dcx-ng-icon [class]="iconClasses()" [name]="iconName()" [size]="iconSize()" [spacing]="iconSpacing()"
    [color]="iconColor()" aria-hidden="true" />
</ng-template>

<button [type]="type()" [disabled]="disabled()" [class]="buttonClasses()" (click)="onClick()"
  [attr.aria-label]="computedAriaLabel()">
  @if (icon() && (iconPosition() === 'left' || iconPosition() === 'top')) {
  <ng-container *ngTemplateOutlet="iconTpl" />
  }

  @if (label()) {
  <span class="label">{{ label() }}</span>
  }

  @if (iconRightName()) {
  <dcx-ng-icon class="icon icon--right" [name]="iconRightName()" [size]="iconSize()" [color]="iconColor()"
    aria-hidden="true" />
  }

  @if (icon() && ((iconPosition() === 'right' && !iconRightName()) || iconPosition() === 'bottom')) {
  <ng-container *ngTemplateOutlet="iconTpl" />
  }

  <ng-content select="dcx-ng-icon" />
  <ng-content select="[button-trailing]" />
</button>
