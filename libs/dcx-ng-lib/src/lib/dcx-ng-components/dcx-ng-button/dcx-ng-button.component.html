<ng-template #buttonContent>
  @if (icon() && iconPosition() === 'left') {
  <dcx-ng-icon [class]="iconClasses()" [name]="iconName()" [size]="iconSize()" [spacing]="iconSpacing()"
    [color]="iconColor()" aria-hidden="true" />
  }

  @if (icon() && iconPosition() === 'top') {
  <dcx-ng-icon [class]="iconClasses()" [name]="iconName()" [size]="iconSize()" [spacing]="iconSpacing()"
    [color]="iconColor()" aria-hidden="true" />
  }

  @if (label()) {
  <span class="label">{{ label() }}</span>
  }

  @if (iconRightName()) {
  <dcx-ng-icon class="icon icon--right" [name]="iconRightName()" [size]="iconSize()" [color]="iconColor()"
    aria-hidden="true" />
  }

  @if (icon() && iconPosition() === 'right' && !iconRightName()) {
  <dcx-ng-icon [class]="iconClasses()" [name]="iconName()" [size]="iconSize()" [spacing]="iconSpacing()"
    [color]="iconColor()" aria-hidden="true" />
  }

  @if (icon() && iconPosition() === 'bottom') {
  <dcx-ng-icon [class]="iconClasses()" [name]="iconName()" [size]="iconSize()" [spacing]="iconSpacing()"
    [color]="iconColor()" aria-hidden="true" />
  }

  <ng-content select="dcx-ng-icon" />
  <ng-content select="[button-trailing]" />
</ng-template>

@if (href()) {
<a [href]="href()" [target]="target() || null" [class]="buttonClasses()" [attr.aria-label]="computedAriaLabel()"
  [attr.aria-disabled]="disabled() || null" [class.dcx-ng-button--disabled-link]="disabled()" (click)="onClick()">
  <ng-container *ngTemplateOutlet="buttonContent" />
</a>
} @else {
<button [type]="type()" [disabled]="disabled()" [class]="buttonClasses()" (click)="onClick()"
  [attr.aria-label]="computedAriaLabel()">
  <ng-container *ngTemplateOutlet="buttonContent" />
</button>
}
