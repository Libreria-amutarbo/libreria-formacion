@if (isVisible()) {
  <div class="dialog-root">
    <div class="dialog-backdrop" (pointerdown)="onBackdropClick($event)"></div>

    <div [class]="dialogClasses" role="dialog" aria-modal="true">
      <div class="dialog-header">
        @if (title()) {
          <h3 class="dialog-title">{{ title() }}</h3>
        }

        @if (showClose()) {
          <dcx-ng-button
            class="dialog-close"
            ariaLabel="Cerrar diálogo"
            variant="terciary"
            size="s"
            [icon]="true"
            iconName="x-lg"
            iconSpacing="none"
            iconSize="m"
            (buttonClick)="close()"
          />
        }
      </div>

      @if (bodyTemplate()) {
        <div class="dialog-body">
          <ng-container *ngTemplateOutlet="bodyTemplate()"></ng-container>
        </div>
      }

      @if (footerTemplate()) {
        <div class="dialog-footer">
          <ng-container *ngTemplateOutlet="footerTemplate()"></ng-container>
        </div>
      }
    </div>
  </div>
}
