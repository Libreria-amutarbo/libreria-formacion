<div class="dcx-tabs">
  @if (hasControls()) {
    <div class="dcx-tabs__controls">
      @for (tab of tabs(); track tab.id; let i = $index) {
        <dcx-ng-button
          label="{{(i+1).toString()}}"
          (buttonClick)="selectTab(tab.id)"
          [pressed]="isButtonPressed(tab.id)"
        >
        </dcx-ng-button>
      }
    </div>
  }
  <div class="dcx-tabs__header-container" [class]="tabHeaderClasses()">
    @if (hasOverflow() && canScrollLeft()) {
      <dcx-ng-button
        class="dcx-tabs__scroll-button dcx-tabs__scroll-button--left"
        variant="icon-only"
        size="m"
        icon
        [iconName]="'chevron-left'"
        [iconSize]="'l'"
        (buttonClick)="scrollLeft()"
        [attr.aria-label]="'Scroll left'"
      ></dcx-ng-button>
    }
    <div
      [class]="tabHeaderClasses()"
      role="tablist"
      #tabsHeader
      (scroll)="updateScrollButtons()"
    >
      @for (tab of tabs(); track tab.id) {
        <span
          [class]="tabButtonClasses(tab.id)"
          [attr.role]="'tab'"
          [attr.aria-selected]="isActive(tab.id)"
          [attr.aria-controls]="'panel-' + tab.id"
          [attr.data-tab]="tab.id"
          [attr.aria-disabled]="!!tab.disabled"
          [attr.tabindex]="!!tab.disabled ? -1 : 0"
          (click)="selectTab(tab.id)"
        >
          @if (tab.icon) {
            <dcx-ng-icon [name]="tab.icon" [size]="'l'" aria-hidden="true" />
          }
          {{ tab.label }}
        </span>
      }
    </div>
    @if (hasOverflow() && canScrollRight()) {
      <dcx-ng-button
        class="dcx-tabs__scroll-button dcx-tabs__scroll-button--right"
        variant="icon-only"
        size="m"
        icon
        [iconName]="'chevron-right'"
        [iconSize]="'l'"
        (buttonClick)="scrollRight()"
        [attr.aria-label]="'Scroll right'"
      ></dcx-ng-button>
    }
  </div>

  @if (activeTab(); as tab) {
    <div class="dcx-tabs__content">
      <div
        class="dcx-tab__panel"
        role="tabpanel"
        [id]="'panel-' + tab.id"
        [attr.aria-labelledby]="tab.id"
      >
        <ng-content></ng-content>
      </div>
    </div>
  }
</div>
