<span class="dcx-slider-value-label">
  {{ valueInput() }}
</span>

<dcx-ng-input
  class="dcx-slider-input"
  [type]="inputType.RANGE"
  [value]="valueInput()"
  [attr.min]="min()"
  [attr.max]="maxInput()"
  [style.width.px]="vertical() ? sliderWidth() : '100%'"
  [orientation]="vertical() ? 'vertical' : 'horizontal'"
  (valueChange)="onInput($event)"
/>
