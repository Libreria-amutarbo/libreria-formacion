<nav aria-label="Breadcrumb">
  <ol class="dcx-breadcrumb" role="list">
    @for (item of items(); track item.label; let last = $last) {
      <li class="dcx-breadcrumb__item" [class.active]="last" [class.disabled]="item.disabled">
        @if (!last) {
          @if (item.href) {
            <a
              class="dcx-breadcrumb__link"
              [attr.href]="item.disabled ? null : item.href"
              [attr.aria-disabled]="item.disabled ? 'true' : null"
            >
              @if (item.icon) {
                <dcx-ng-icon [name]="item.icon"></dcx-ng-icon>
              }
              {{ item.label }}
            </a>
          } @else {
            <span class="dcx-breadcrumb__text">
              @if (item.icon) {
                <dcx-ng-icon [name]="item.icon"></dcx-ng-icon>
              }
              {{ item.label }}
            </span>
          }

          <span class="dcx-breadcrumb__separator" aria-hidden="true">
            <dcx-ng-icon [name]="iconSeparator()"></dcx-ng-icon>
          </span>
        } @else {
          <span class="dcx-breadcrumb__current" aria-current="page">
            @if (item.icon) {
              <dcx-ng-icon [name]="item.icon"></dcx-ng-icon>
            }
            {{ item.label }}
          </span>
        }
      </li>
    }
  </ol>
</nav>
