<label [class]="radioClasses()">
  <input
    class="dcx-ng-radio__native"
    type="radio"
    [name]="name()"
    [value]="value() || ''"
    [checked]="isChecked()"
    [disabled]="isDisabled()"
    [attr.aria-label]="ariaLabelBinding()"
    [attr.aria-invalid]="error() ? 'true' : null"
    (change)="onInputChange(value())"
    (blur)="onBlur()"
  />

  <span class="dcx-ng-radio__control" aria-hidden="true"></span>

  @if (label()) {
    <span class="dcx-ng-radio__label">{{ label() }}</span>
  }
</label>
