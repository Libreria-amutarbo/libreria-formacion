<label class="dcx-ng-radio" [class.unstyled]="unstyled()" [class.error]="error()" [class.hover]="hover()"
  [class.focus]="focus()" [ngClass]="sizeClass()">
  <dcx-ng-input [type]="inputType" [name]="name()" [value]="displayValue()" [checked]="isChecked()"
    [ariaLabel]="ariaLabelBinding()" [disabled]="disabled()" (valueChange)="onInputChange(value())"></dcx-ng-input>
  @if (label()) {
  <span>{{ label() }}</span>
  }
</label>
