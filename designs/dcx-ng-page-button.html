      :root {
        --bg-primary:#0058ab;--bg-primary-hover:#004080;--bg-primary-pressed:#121a38;
        --bg-hover:#f7f8fa;--bg-pressed:#e1e3e6;--bg-default:#fff;--bg-surface:#f4f5f7;
        --text-white:#fff;--text-dark:#2a2e33;--text-disabled:#696e75;--text-disabled-dark:#4f545a;
        --border-btn:#2a2e33;--border-focus:#1db8f2;--border-disabled:#696e75;
        --sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-6:24px;
        --r-sm:4px;--ff:'Inter',sans-serif;
      }
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:var(--ff);background:var(--bg-surface);padding:2.5rem;color:var(--text-dark)}
      .page-title{font-size:20px;font-weight:300;letter-spacing:.03em;color:#000;text-transform:uppercase;margin-bottom:.25rem}
      .comp-title{font-size:24px;font-weight:700;color:#000;margin-bottom:.5rem}
      .divider{border:none;border-top:1px solid #e5e7eb;margin-bottom:2rem}
      .size-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9ca3af;margin:1.5rem 0 .75rem}
      .grid-header{display:grid;grid-template-columns:90px repeat(5,148px);gap:8px;margin-bottom:6px}
      .grid-row{display:grid;grid-template-columns:90px repeat(5,148px);gap:8px;align-items:center;margin-bottom:6px}
      .col-lbl{font-size:11px;font-weight:600;color:#9ca3af;text-align:center;letter-spacing:.06em}
      .row-lbl{font-size:11px;font-weight:600;color:#9ca3af;text-align:right;padding-right:10px}
      .cell{display:flex;justify-content:center;align-items:center}

      /* Base */
      .btn{font-family:var(--ff);font-weight:600;font-size:16px;line-height:1.5;display:inline-flex;align-items:center;justify-content:center;gap:var(--sp-2);border-radius:var(--r-sm);border:none;cursor:pointer;position:relative;white-space:nowrap}
      .btn-lg{padding:var(--sp-4) var(--sp-6)}
      .btn-md{padding:var(--sp-3) var(--sp-4)}
      .btn-sm{padding:var(--sp-2) var(--sp-3)}

      /* Primary */
      .p-def{background:var(--bg-primary);color:var(--text-white)}
      .p-hov{background:var(--bg-primary-hover);color:var(--text-white)}
      .p-pre{background:var(--bg-primary-pressed);color:var(--text-white)}
      .p-foc{background:var(--bg-primary);color:var(--text-white)}
      .p-foc::before{content:'';position:absolute;inset:-4px;border:2px solid var(--border-focus);border-radius:var(--r-sm)}
      .p-dis{background:var(--bg-pressed);color:var(--text-disabled-dark);cursor:not-allowed}

      /* Secondary */
      .s-def{background:transparent;color:var(--text-dark);border:1px solid var(--border-btn)}
      .s-hov{background:var(--bg-hover);color:var(--text-dark);border:1px solid var(--border-btn)}
      .s-pre{background:var(--bg-pressed);color:var(--text-dark);border:1px solid var(--border-btn)}
      .s-foc{background:transparent;color:var(--text-dark);border:1px solid var(--border-btn)}
      .s-foc::before{content:'';position:absolute;inset:-5px;border:2px solid var(--border-focus);border-radius:var(--r-sm)}
      .s-dis{background:var(--bg-hover);color:var(--text-disabled-dark);border:1px solid var(--border-disabled);cursor:not-allowed}

      /* Tertiary */
      .t-def,.t-hov,.t-pre,.t-foc,.t-dis{background:transparent}
      .t-def{color:var(--text-dark)}
      .t-hov{background:var(--bg-hover);color:var(--text-dark)}
      .t-pre{background:var(--bg-pressed);color:var(--text-dark)}
      .t-foc{color:var(--text-dark)}
      .t-foc::before{content:'';position:absolute;inset:-4px;border:2px solid var(--border-focus);border-radius:var(--r-sm)}
      .t-dis{color:var(--text-disabled);cursor:not-allowed}
      .btn.t-def .lbl,.btn.t-hov .lbl,.btn.t-pre .lbl,.btn.t-foc .lbl,.btn.t-dis .lbl{text-decoration:underline}

      /* Icons */
      .ic{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
      .ic svg{width:100%;height:100%}
    </style>
