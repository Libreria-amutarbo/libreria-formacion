<section class="breadcrumb-page">
  <div class="breadcrumb-card">
    <p class="breadcrumb-card__label">BREADCRUMB</p>

    <div class="breadcrumb-example">
      <h2 class="example-title">Ejemplo 1 - BreadCrumb con chevron como separador</h2>
      <dcx-ng-breadcrumb
        [items]="dcxBreadCrumbItem"
        iconSeparator="chevron-right"
      ></dcx-ng-breadcrumb>
    </div>

    <div class="breadcrumb-example">
      <h2 class="example-title">Ejemplo 2 - BreadCrumb con slash como separador</h2>
      <dcx-ng-breadcrumb
        [items]="dcxBreadCrumbSlashes"
        iconSeparator="slash-lg"
      ></dcx-ng-breadcrumb>
    </div>

    <div class="breadcrumb-example">
      <h2 class="example-title">Ejemplo 3 - BreadCrumb con iconos</h2>
      <dcx-ng-breadcrumb
        [items]="dcxBreadCrumbWithIcon"
        iconSeparator="chevron-right"
      ></dcx-ng-breadcrumb>
    </div>

    <div class="breadcrumb-example">
      <h2 class="example-title">
        Ejemplo 4 - BreadCrumb con los elementos deshabilitados
      </h2>
      <dcx-ng-breadcrumb
        [items]="dcxBreadCrumbDisabled"
        iconSeparator="chevron-right"
      ></dcx-ng-breadcrumb>
    </div>
  </div>
</section>
