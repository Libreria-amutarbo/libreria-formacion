<div class="page-container">
  <h1>Popover Component</h1>
  <p>The Popover component is used to display content in an overlay that opens on demand.</p>
  
  <div class="demo-section">
    <h2>Basic Popover</h2>
    <div class="demo-box">

      <div #buttonContainer class="button-container">
        <dcx-ng-button
          label="Open Popover"
          (buttonClick)="myPopover.toggle($event, buttonContainer)"
        ></dcx-ng-button>
      </div>

      <dcx-ng-popover #myPopover>
        <div class="popover-content">
          <h3 class="popover-title">Popover Title</h3>
          <p class="popover-description">This is the content inside the popover. It can be any HTML or Angular component.</p>
        </div>
      </dcx-ng-popover>
    </div>
  </div>
</div>
