<section>
  <h2 class="example-title">Ejemplo 1 - Grid base 12 columnas</h2>
  <div class="dcx-grid dcx-grid--gap-m">
    <div class="dcx-col dcx-col--6"><div class="grid-box">col-6</div></div>
    <div class="dcx-col dcx-col--6"><div class="grid-box">col-6</div></div>

    <div class="dcx-col dcx-col--4"><div class="grid-box">col-4</div></div>
    <div class="dcx-col dcx-col--4"><div class="grid-box">col-4</div></div>
    <div class="dcx-col dcx-col--4"><div class="grid-box">col-4</div></div>

    <div class="dcx-col dcx-col--3"><div class="grid-box">col-3</div></div>
    <div class="dcx-col dcx-col--3"><div class="grid-box">col-3</div></div>
    <div class="dcx-col dcx-col--3"><div class="grid-box">col-3</div></div>
    <div class="dcx-col dcx-col--3"><div class="grid-box">col-3</div></div>
  </div>
</section>

<hr />

<section>
  <h2 class="example-title">Ejemplo 2 - Grid con componentes (Buttons)</h2>
  <div class="dcx-grid dcx-grid--gap-m">
    <div class="dcx-col dcx-col--4">
      <dcx-ng-button label="Primary" variant="primary"></dcx-ng-button>
    </div>
    <div class="dcx-col dcx-col--4">
      <dcx-ng-button label="Secondary" variant="secondary"></dcx-ng-button>
    </div>
    <div class="dcx-col dcx-col--4">
      <dcx-ng-button label="Disabled" [disabled]="true"></dcx-ng-button>
    </div>
  </div>
</section>

<hr />
