@for (slider of sliders; track slider; let i = $index) {
  <section>
    <h2 class="example-title">Ejemplo {{i+1}} - {{slider.label}}</h2>
    <dcx-ng-slider
      [showLabel]="slider.showLabel"
      [value]="slider.value"
      [step]="slider.step"
      [min]="slider.min"
      [max]="slider.max"
      [vertical]="slider.vertical"
      (valueChange)="onSliderValueChange(i, $event)"
    >
    </dcx-ng-slider>
  </section>

  @if (i < sliders.length - 1) {
    <hr />
  }
}
